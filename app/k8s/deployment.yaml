apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-dashboard
  namespace: fleet-demo
  labels:
    app: fleet-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fleet-dashboard
  template:
    metadata:
      labels:
        app: fleet-dashboard
    spec:
      containers:
        - name: dashboard
          image: <ACR_LOGIN_SERVER>/fleet-dashboard:v1
          ports:
            - containerPort: 8080
          env:
            - name: CLUSTER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['cluster-name']
            - name: ENVIRONMENT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['environment']
            - name: REGION
              value: "australiaeast"
            - name: APP_VERSION
              value: "1.0.0"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
